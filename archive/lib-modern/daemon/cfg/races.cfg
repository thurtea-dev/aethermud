# weight: The average weight of people of that race
# fingers: How many fingers a player of that race has on a hand
# wielding limbs: Which of the limbs of that race can wield weapons
# str:con:int:wis:dex:cha: All modifications to stat rolls for the race
# body type: the file to look for body type in
#
